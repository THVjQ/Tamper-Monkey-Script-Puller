<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drive Script Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="app">

  <header id="header">
    <div class="header-left">
      <span class="logo">⚡</span>
      <span class="title">Script Manager</span>
    </div>
    <button id="settings-btn" class="icon-btn" title="Change manifest ID">⚙</button>
  </header>

  <!-- Setup screen -->
  <div id="setup-screen" class="screen hidden">
    <p class="setup-intro">Paste your <strong>manifest.json</strong> Google Drive file ID to get started.</p>
    <input id="manifest-input" class="text-input" placeholder="e.g. 1BxiMVs0XRA5nFMdKvBdBZjgmUUq…" autocomplete="off" spellcheck="false">
    <p class="setup-hint">The file must be shared: <em>Anyone with the link → Viewer</em></p>
    <button id="save-manifest-btn" class="btn btn-primary full-width">Save &amp; Load Scripts</button>
  </div>

  <!-- Main screen -->
  <div id="main-screen" class="screen hidden">

    <div id="tab-bar">
      <button class="tab-btn active" data-tab="scripts">⚡ Scripts</button>
      <button class="tab-btn" data-tab="apikeys">🔑 API Keys</button>
    </div>

    <!-- Scripts tab -->
    <div id="tab-scripts" class="tab-pane">
      <button id="scan-btn">🔍 Scan for new &amp; updates</button>
      <div id="script-list"></div>
      <div id="footer">
        <div class="footer-actions">
          <button id="all-on-btn"  class="btn btn-sm">All On</button>
          <button id="all-off-btn" class="btn btn-sm">All Off</button>
        </div>
        <p id="status-msg" class="status-msg"></p>
      </div>
    </div>

    <!-- API Keys tab -->
    <div id="tab-apikeys" class="tab-pane hidden">
      <div id="apikey-list"></div>
    </div>

  </div>

  <!-- Loading state -->
  <div id="loading-screen" class="screen hidden">
    <div class="spinner"></div>
    <p>Loading scripts…</p>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
